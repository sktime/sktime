name: AI PR Pre-Review Bot

on:
  pull_request:
    types: [labeled]

jobs:
  ai-review:
    if: contains(github.event.label.name, 'needs-ai-review')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run AI Pre-Review
        run: echo "AI Pre-Review bot triggered successfully!"
