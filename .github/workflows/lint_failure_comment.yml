# This workflow posts a helpful message when the linting (code-quality) job fails.
# It runs after the main CI workflow "Install and test" completes.
# The comment is only posted if the failure was specifically caused by the
# "code-quality" job and the run originated from a pull request.

name: Comment on linting failure

on:
  workflow_run:
    workflows: ["Install and test"]
    types:
      - completed

permissions:
  pull-requests: write
  actions: read

jobs:
  lint-failure-comment:
    # Run only if the completed workflow run was triggered by a pull request
    # and the workflow ended in failure.
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Detect code-quality failure and locate PR
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Get all jobs from the completed workflow run
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            // Find the code-quality job
            const codeQualityJob = jobs.data.jobs.find(job =>
              job.name.includes("code-quality")
            );

            if (!codeQualityJob) {
              console.log("No code-quality job found in this workflow run.");
              return;
            }

            if (codeQualityJob.conclusion !== "failure") {
              console.log("code-quality job did not fail. No comment needed.");
              return;
            }

            console.log("code-quality job failed. Searching for associated PR...");

            // Find the PR associated with the workflow run
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head: `${context.payload.workflow_run.head_repository.owner.login}:${context.payload.workflow_run.head_branch}`
            });

            if (pulls.data.length === 0) {
              console.log("No open PR found for this branch.");
              return;
            }

            const prNumber = pulls.data[0].number;
            console.log(`PR found: #${prNumber}`);

            core.setOutput("pr_number", prNumber);

      - name: Post helpful linting guidance
        if: steps.check.outputs.pr_number
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.check.outputs.pr_number }}
          header: linting-guidance
          message: |
            ### ⚠️ Linting / Formatting Checks Failed

            Thank you for your contribution to **sktime**.

            The automated **code-quality (linting)** check did not pass for this pull request.  
            This usually happens when the code does not fully follow the project's formatting rules.

            You can resolve this locally using the repository’s pre-commit configuration:

            **Step 1 — Install the required formatting tool (one time only):**
            ```bash
            pip install pre-commit
            pre-commit install
            ```

            **Step 2 — Run the checks and apply automatic fixes:**
            ```bash
            pre-commit run --all-files
            ```

            This command will automatically format your files where possible and show any remaining issues that require manual fixes.

            **Step 3 — Commit the updated files and push again:**
            ```bash
            git add .
            git commit -m "style: apply pre-commit formatting fixes"
            git push
            ```

            For more details, please refer to the  
            **[sktime coding standards guide](https://www.sktime.net/en/latest/developer_guide/coding_standards.html).**

            If anything is unclear or you need assistance, feel free to ask in this pull request — the maintainers will be happy to help.