# This workflow is triggered when the main "Install and test" workflow completes.
# It checks if the workflow failed during a pull request due to code quality or linting issues.
# If so, it posts a helpful guide on the pull request to assist the contributor.
# It includes a check to ensure the bot only comments once per pull request.

name: Comment on linting failure

on:
  workflow_run:
    workflows: ["Install and test"]
    types:
      - completed

permissions:
  pull-requests: write

jobs:
  post-lint-help:
    runs-on: ubuntu-latest
    # We only run this job if the triggering workflow is a pull request and it failed.
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request' }}

    steps:
      # Step 1: Retrieve the pull request number from the workflow_run payload.
      - name: Get PR number
        id: get-pr
        uses: actions/github-script@v6
        with:
          result-encoding: string
          script: |
            // Get PR number from the triggering workflow run
            const prs = context.payload.workflow_run.pull_requests;
            if (prs && prs.length > 0) {
              return prs[0].number;
            }
            return null;

      # Step 2: Prevent duplicate comments. Check if the bot has already posted the guidance.
      - name: Check if bot already commented
        id: check-comment
        if: steps.get-pr.outputs.result != 'null'
        uses: actions/github-script@v6
        with:
          result-encoding: string
          script: |
            const prNumber = parseInt('${{ steps.get-pr.outputs.result }}');
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            // Search for a previous comment made by the bot containing our unique identifier
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- lint-helper-bot -->')
            );
            return botComment ? 'true' : 'false';

      # Step 3: Post the formal guidance comment ONLY if it hasn't been posted yet.
      - name: Post helpful linting failure comment
        if: steps.get-pr.outputs.result != 'null' && steps.check-comment.outputs.result == 'false'
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = parseInt('${{ steps.get-pr.outputs.result }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,

              body: `<!-- lint-helper-bot -->
            ## Linting or Formatting Checks Failed

            Thank you for your contribution to sktime. It appears that the automated code quality (linting) checks did not pass for this pull request.

            This is a standard occurrence due to project-specific coding rules. You can easily resolve the issues locally by following these steps:

            **Step 1 — Install the formatting toolkit** (only needed once):
            \`\`\`bash
            pip install pre-commit
            \`\`\`

            **Step 2 — Auto-format and identify remaining issues**:
            \`\`\`bash
            pre-commit run --all-files
            \`\`\`
            This command will automatically reformat your files where possible and display any issues that require manual correction.

            **Step 3 — Commit and reflect the changes in your pull request**:
            \`\`\`bash
            git add .
            git commit -m "style: apply coding standards"
            git push
            \`\`\`

            For detailed instructions and coding rules, please refer to the [sktime coding standards documentation](https://www.sktime.net/en/latest/developer_guide/coding_standards.html).

            If you are still experiencing issues after following these steps, please leave a comment on this pull request. A maintainer will gladly assist you with the resolution.`
            });
