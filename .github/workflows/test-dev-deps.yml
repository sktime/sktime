name: Test with Dev Dependencies

on:
  push:
    branches:
      - feat/dev-deps-test
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  test-dev-deps:
    name: Nightly Dev Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install sktime & dev deps
        run: |
          pip install uv
          uv pip install --system .[all_extras,dev]

      - name: Install pre-release dependencies
        run: |
          uv pip install --system --pre --upgrade numpy pandas scikit-learn

      - name: Verify pre-release imports
        run: |
          python -c "
          import numpy, pandas, sklearn
          print('numpy', numpy.__version__)
          print('pandas', pandas.__version__)
          print('sklearn', sklearn.__version__)
          "
      - name: Run Smoke Test
        continue-on-error: true
        run: |
          # Failures here are expected and intentional - this workflow monitors
          # upstream breaking changes. A failure means the workflow is working.
          # See: https://github.com/sktime/sktime/pull/9286
          pytest sktime/tests/test_softdeps.py -v
