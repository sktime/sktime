name: Install and test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HF_TOKEN: ${{ secrets.HF_READ_TOKEN }}

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: repository checkout step
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: python environment step
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: install pre-commit
        run: uv pip install pre-commit
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')
          echo "CHANGED_FILES=${CHANGED_FILES}" >> $GITHUB_ENV

      - name: Print changed files
        run: |
          echo "Changed files:" && echo "$CHANGED_FILES" | tr ' ' '\n'

      - name: Run pre-commit on changed files
        run: |
          if [ -n "$CHANGED_FILES" ]; then
            pre-commit run --color always --files $CHANGED_FILES --show-diff-on-failure
          else
            echo "No changed files to check."
          fi

      - name: check missing __init__ files

        run: build_tools/fail_on_missing_init_files.sh
        shell: bash

  detect-notebooks-change:
    needs: code-quality
    name: detect change affecting notebooks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      notebooks: ${{ steps.check.outputs.notebooks }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Needed to access the full git history

      - name: Fetch main branch
        run: git fetch origin main

      - name: Check if examples, sktime or pyproject.toml changed
        id: check
        run: |
          if git diff --quiet origin/main -- examples/ sktime/ pyproject.toml; then
            echo "No notebook related changes"
            echo "notebooks=false" >> $GITHUB_OUTPUT
          else
            echo "Detected changes in notebooks or sktime"
            echo "notebooks=true" >> $GITHUB_OUTPUT
          fi

  run-notebook-examples:
    needs: detect-notebooks-change
    if: ${{ needs.detect-notebooks-change.outputs.notebooks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: 3.11

      - name: Install dependencies
        run: uv pip install .[notebooks,binder,dev]
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Show dependencies
        run: uv pip list

      - name: Run example notebooks
        run: build_tools/run_examples.sh
        shell: bash

  run-blogpost-examples:
    needs: detect-notebooks-change
    if: ${{ needs.detect-notebooks-change.outputs.notebooks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install .[notebooks,binder]
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Show dependencies
        run: uv pip list

      - name: Run example notebooks
        run: build_tools/run_blogposts.sh
        shell: bash

  detect-changed-classes:
    needs: detect-package-change
    if: ${{ needs.detect-package-change.outputs.sktime == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      all_changed_classes: ${{ steps.get-change-list.outputs.all_changed_classes }}
      all_changed_classes_length: ${{ steps.get-change-list.outputs.all_changed_classes_length }}
      vm_changed_classes: ${{ steps.get-change-list.outputs.vm_changed_classes }}
      vm_changed_classes_length: ${{ steps.get-change-list.outputs.vm_changed_classes_length }}
      r_vm_changed_classes: ${{ steps.get-change-list.outputs.r_vm_changed_classes }}
      r_vm_changed_classes_length: ${{ steps.get-change-list.outputs.r_vm_changed_classes_length }}

    steps:
      - uses: actions/checkout@v7

      - run: git remote set-branches origin 'main'

      - run: git fetch --depth 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install sktime with dev dependencies
        run: pip install .[dev]
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Get list of names of changed classes
        id: get-change-list
        run: |
          ALL_CHANGED_CLASSES=$(python -c 'from sktime.tests.test_switch import _get_all_changed_classes; import json; print(json.dumps(_get_all_changed_classes()))')
          ALL_CHANGED_CLASSES_LENGTH=$(python -c 'from sktime.tests.test_switch import _get_all_changed_classes; print(len(_get_all_changed_classes()))')

          VM_CHANGED_CLASSES=$(python -c 'from sktime.tests.test_switch import _get_all_changed_classes; import json; print(json.dumps(_get_all_changed_classes(vm=True)))')
          VM_CHANGED_CLASSES_LENGTH=$(python -c 'from sktime.tests.test_switch import _get_all_changed_classes; print(len(_get_all_changed_classes(vm=True)))')

          R_VM_CHANGED_CLASSES=$(python -c 'from sktime.tests.test_switch import _get_all_changed_classes; import json; print(json.dumps(_get_all_changed_classes(vm=True, r=True)))')
          R_VM_CHANGED_CLASSES_LENGTH=$(python -c 'from sktime.tests.test_switch import _get_all_changed_classes; print(len(_get_all_changed_classes(vm=True, r=True)))')

          echo "vm_changed_classes=$VM_CHANGED_CLASSES" >> $GITHUB_OUTPUT
          echo "vm_changed_classes_length=$VM_CHANGED_CLASSES_LENGTH" >> $GITHUB_OUTPUT

          echo "all_changed_classes=$ALL_CHANGED_CLASSES" >> $GITHUB_OUTPUT
          echo "all_changed_classes_length=$ALL_CHANGED_CLASSES_LENGTH" >> $GITHUB_OUTPUT

          echo "r_vm_changed_classes=$R_VM_CHANGED_CLASSES" >> $GITHUB_OUTPUT
          echo "r_vm_changed_classes_length=$R_VM_CHANGED_CLASSES_LENGTH" >> $GITHUB_OUTPUT

      - name: Print changed classes
        run: |
          echo "All changed classes (${{ steps.get-change-list.outputs.all_changed_classes_length }}):"
          echo "${{ steps.get-change-list.outputs.all_changed_classes }}"
          echo

          echo "Changed classes requiring VM, Python only (${{ steps.get-change-list.outputs.vm_changed_classes_length }}):"
          echo "${{ steps.get-change-list.outputs.vm_changed_classes }}"
          echo


          echo "Changed classes requiring VM and R (${{ steps.get-change-list.outputs.r_vm_changed_classes_length }}):"
          echo "${{ steps.get-change-list.outputs.r_vm_changed_classes }}"

  prepare-chunks:
    needs: detect-changed-classes
    if: ${{ needs.detect-changed-classes.outputs.obj_list != '[]' }}

    strategy:
      fail-fast: false
      matrix:
        flag: ${{ fromJson(needs.detect-changed-classes.outputs.obj_list) }}
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    runs-on: ubuntu-latest
    outputs:
      vm_chunks: ${{ steps.chunk_vm.outputs.vm_chunks }}
      r_vm_chunks: ${{ steps.chunk_r.outputs.r_vm_chunks }}

    steps:
      - name: Chunk VM changed classes
        id: chunk_vm
        shell: bash
        run: |
          python - <<'EOF'
          import json
          import os

          # Load input
          obj_list = json.loads('''${{ needs.detect-changed-classes.outputs.vm_changed_classes }}''')

          CHUNK_SIZE = 10  # chosen such that this times number of runs is smaller 256

          # Split into chunks
          chunks = [obj_list[i:i+CHUNK_SIZE] for i in range(0, len(obj_list), CHUNK_SIZE)]

          # Fallback to avoid empty matrix error
          if not chunks:
              chunks = [[]]

          print(f"Number of chunks: {len(chunks)}", file=os.sys.stderr)
          print(f"Chunks: {chunks}")

          # Emit output
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"vm_chunks={json.dumps(chunks)}\n")
          EOF

      - name: Chunk R VM changed classes
        id: chunk_r
        shell: bash
        run: |
          python - <<'EOF'
          import json
          import os

          # Load input
          obj_list = json.loads('''${{ needs.detect-changed-classes.outputs.r_vm_changed_classes }}''')

          CHUNK_SIZE = 10  # chosen such that this times number of runs is smaller 256

          # Split into chunks
          chunks = [obj_list[i:i+CHUNK_SIZE] for i in range(0, len(obj_list), CHUNK_SIZE)]

          # Fallback to avoid empty matrix error
          if not chunks:
              chunks = [[]]

          print(f"Number of chunks: {len(chunks)}", file=os.sys.stderr)
          print(f"Chunks: {chunks}")

          # Emit output
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"r_vm_chunks={json.dumps(chunks)}\n")
          EOF

  test-est:
    needs: [detect-changed-classes, prepare-chunks, test-nosoftdeps]
    if: ${{ needs.detect-changed-classes.outputs.vm_chunks != '[]' }}

    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.prepare-chunks.outputs.vm_chunks) }}

    uses: ./.github/workflows/test_est.yml
    with:
      flags: ${{ toJson(matrix.chunk) }}
    secrets: inherit

  test-est-r:
    needs: [detect-changed-classes, prepare-chunks, test-nosoftdeps]
    if: ${{ needs.detect-changed-classes.outputs.r_vm_chunks != '[]' }}

    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.prepare-chunks.outputs.r_vm_chunks) }}

    uses: ./.github/workflows/test_est_r.yml
    with:
      flags: ${{ toJson(matrix.chunk) }}
    secrets: inherit

  detect-package-change:
    needs: code-quality
    name: detect package changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      sktime: ${{ steps.check.outputs.sktime }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Needed to access the full git history

      - name: Fetch main branch
        run: git fetch origin main

      - name: Check if sktime or pyproject.toml changed
        id: check
        run: |
          if git diff --quiet origin/main -- sktime/ pyproject.toml; then
            echo "No sktime-related changes"
            echo "sktime=false" >> $GITHUB_OUTPUT
          else
            echo "Detected changes in sktime"
            echo "sktime=true" >> $GITHUB_OUTPUT
          fi

  test-nodevdeps:
    needs: detect-package-change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: 3.11

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install sktime and dependencies
        run: pip install .
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Run pytest-free tests
        run: |
          python sktime/_nopytest_tests.py

  test-nosoftdeps:
    needs: detect-package-change
    if: ${{ needs.detect-package-change.outputs.sktime == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: 3.11

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install sktime and dependencies
        run: pip install .[dev]
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Show dependencies
        run: uv pip list

      - name: Run tests
        run: make test_softdeps

  test-nosoftdeps-full:
    needs: test-nosoftdeps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: git remote set-branches origin 'main'

      - run: git fetch --depth 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: 3.11

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install sktime and dependencies
        run: pip install .[dev]
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Show dependencies
        run: uv pip list

      - name: Run tests
        run: make PYTESTOPTIONS="--matrixdesign=False --timeout=600" test_softdeps_full

  test-mlflow:
    needs: test-nosoftdeps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mlflow-version: ["2.9.2", "3.latest"]
    name: test-mlflow-${{ matrix.mlflow-version }}
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: 3.11

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install sktime and dependencies
        run: |
          if [[ "${{ matrix.mlflow-version }}" == "2.9.2'" ]]; then
            uv pip install .[all_extras,dev,mlflow_tests,mlflow2] --no-cache-dir
          else
            uv pip install .[all_extras,dev,mlflow_tests] --no-cache-dir
          fi
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Show dependencies
        run: uv pip list

      - name: Run tests
        run: make test_mlflow

  test-deps-2023:
    needs: test-nosoftdeps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: git remote set-branches origin 'main'

      - run: git fetch --depth 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: 3.11

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install sktime and dependencies
        # We require `scikit-base>=0.6.1` which was released after the 2023 cutoff
        # so we bump its date later
        run: >
          uv pip install .[dev]
          --exclude-newer-package "scikit-base=false"
          --exclude-newer-package "setuptools=false"
        env:
          UV_SYSTEM_PYTHON: 1
          UV_EXCLUDE_NEWER: "2023-07-01"

      - name: Show dependencies
        run: uv pip list

      - name: Run tests
        run: make PYTESTOPTIONS="--matrixdesign=False --timeout=600" test_softdeps_full

  test-deps-2024:
    needs: test-nosoftdeps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: git remote set-branches origin 'main'

      - run: git fetch --depth 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: 3.12

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install sktime and dependencies
        run: >
          uv pip install .[dev]
          --exclude-newer-package "setuptools=false"
          --exclude-newer-package "scikit-base=false"
        env:
          UV_SYSTEM_PYTHON: 1
          UV_EXCLUDE_NEWER: "2024-09-01"

      - name: Show dependencies
        run: uv pip list

      - name: Run tests
        run: make PYTESTOPTIONS="--matrixdesign=False --timeout=600" test_softdeps_full

  detect:
    needs: test-nosoftdeps
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      datasets: ${{ steps.filter.outputs.datasets }}
      pyproject: ${{ steps.filter.outputs.pyproject }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: filter
        name: Detect changed files
        shell: bash
        run: |
          # Get the merge base with the target branch
          BASE=$(git merge-base HEAD origin/${{ github.base_ref }})

          echo "Comparing against $BASE"

          changed_files=$(git diff --name-only "$BASE" HEAD)

          echo "Changed files:"
          echo "$changed_files"

          datasets=false
          pyproject=false

          if echo "$changed_files" | grep -qE '^sktime/(base|datasets)/'; then
            datasets=true
          fi

          if echo "$changed_files" | grep -qE '^pyproject\.toml$'; then
            pyproject=true
          fi

          echo "datasets=$datasets" >> "$GITHUB_OUTPUT"
          echo "pyproject=$pyproject" >> "$GITHUB_OUTPUT"

          echo "datasets=$datasets"
          echo "pyproject=$pyproject"

  test-datasets:
    needs: detect
    name: datasets
    if: ${{ needs.detect.outputs.datasets == 'true' }}
    uses: ./.github/workflows/test_datasets.yml
    secrets: inherit

  test-full:
    needs: test-nosoftdeps

    strategy:
      fail-fast: false # to not fail all combinations if just one fail
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - run: git remote set-branches origin 'main'

      - run: git fetch --depth 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install OSX packages
        run: ./.github/scripts/install_osx_dependencies.sh

      - name: Force non-GUI Matplotlib backend (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: echo "MPLBACKEND=Agg" >> $env:GITHUB_ENV

      - name: Install sktime and dependencies
        shell: bash
        run: uv pip install .[all_extras,dev,dl,compatibility_tests] --no-cache-dir
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Show dependencies
        run: uv pip list

      - name: Show available branches
        run: git branch -a

      - name: Run tests
        run: make test_without_datasets
