name: Unequal Length Forecaster Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect-forecasters:
    runs-on: ubuntu-latest
    outputs:
      forecasters: ${{ steps.get.outputs.forecasters }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install sktime
        run: pip install .[dev]

      - name: Get all forecasters
        id: get
        run: |
          python - <<EOF
          import json
          from sktime.registry import all_estimators

          forecasters = all_estimators("forecaster")
          names = [name for name, _ in forecasters]

          with open("forecasters.json", "w") as f:
              json.dump(names, f)

          print(json.dumps(names))
          EOF

          echo "forecasters=$(cat forecasters.json)" >> $GITHUB_OUTPUT

  test-forecasters:
    needs: collect-forecasters
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        forecaster: ${{ fromJson(needs.collect-forecasters.outputs.forecasters) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install sktime
        run: pip install .[dev]

      - name: Install soft dependencies
        run: |
          python -c "from sktime.registry import deps; print('\n'.join(deps('${{ matrix.forecaster }}', include_test_deps=True)))" > deps.txt
          pip install -r deps.txt
        continue-on-error: true

      - name: Run targeted test
        id: run
        continue-on-error: true
        run: |
          python - <<EOF
          from sktime.registry import all_estimators
          from sktime.utils.estimator_checks import check_estimator

          name = "${{ matrix.forecaster }}"
          forecasters = dict(all_estimators("forecaster"))
          est = forecasters[name]

          try:
              check_estimator(
                  estimator=est,
                  tests_to_run="test_unequal_length_hierarchical_fit_predict",
                  raise_exceptions=True,
              )
              print("PASS:", name)
          except Exception:
              print("FAIL:", name)
              raise
          EOF

      - name: Save failure
        if: steps.run.outcome == 'failure'
        run: |
          echo "${{ matrix.forecaster }}" > failed.txt

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.forecaster }}
          path: failed.txt
        continue-on-error: true

  aggregate:
    needs: test-forecasters
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/download-artifact@v4

      - name: Aggregate failures
        run: |
          echo "=============================="
          echo "FAILED FORECASTERS"
          echo "=============================="

          if ls */failed.txt 1> /dev/null 2>&1; then
            cat */failed.txt | sort | uniq
          else
            echo "None"
          fi
