name: equal-length-forecaster-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect-forecasters:
    runs-on: ubuntu-latest
    outputs:
      forecasters: ${{ steps.get.outputs.forecasters }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install sktime
        run: pip install .[dev]

      - name: Get all forecasters
        id: get
        run: |
          python - <<EOF
          import json
          from sktime.registry import all_estimators

          forecasters = all_estimators("forecaster")
          names = [name for name, _ in forecasters]

          with open("forecasters.json", "w") as f:
              json.dump(names, f)

          print(json.dumps(names))
          EOF

          echo "forecasters=$(cat forecasters.json)" >> $GITHUB_OUTPUT

  test-forecasters:
    needs: collect-forecasters
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        forecaster: ${{ fromJson(needs.collect-forecasters.outputs.forecasters) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install sktime
        run: pip install .[dev]

      - name: Install soft dependencies
        run: |
          python - <<EOF
          from sktime.registry import deps

          name = "${{ matrix.forecaster }}"
          d = deps(name, include_test_deps=True)

          if d:
              with open("deps.txt", "w") as f:
                  f.write("\n".join(d))
          EOF

          if [ -f deps.txt ]; then
            pip install -r deps.txt
          fi
        continue-on-error: true

      - name: Run targeted test
        run: |
          python - <<EOF
          from sktime.registry import all_estimators
          from sktime.utils.estimator_checks import check_estimator

          name = "${{ matrix.forecaster }}"
          print(f"Running test for: {name}")

          forecasters = dict(all_estimators("forecaster"))
          est = forecasters[name]

          check_estimator(
              estimator=est,
              tests_to_run="test_equal_length_hierarchical_fit_predict",
              raise_exceptions=True,
          )

          print(f"PASS: {name}")
          EOF
