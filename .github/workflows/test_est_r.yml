on:
  workflow_call:
    inputs:
      flags:
        required: true
        type: string

env:
  HF_TOKEN: ${{ secrets.HF_READ_TOKEN }}

jobs:
  test-est-r:
    strategy:
      fail-fast: false
      matrix:
        flag: ${{ fromJson(inputs.flags) }}
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install OSX packages
        if: ${{ matrix.os == 'macos-latest' }}
        run: ./.github/scripts/install_osx_dependencies.sh

      - name: Force non-GUI Matplotlib backend (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: echo "MPLBACKEND=Agg" >> $env:GITHUB_ENV

      - name: Install sktime with dev dependencies and skpro
        run: uv pip install .[dev,skpro]
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Install dependencies for ${{ matrix.flag }}
        run: |
          python -c "from sktime.registry import deps; print('\n'.join(deps('${{ matrix.flag }}', include_test_deps=True)))" > deps.txt
          uv pip install --no-upgrade -r deps.txt
        env:
          UV_SYSTEM_PYTHON: 1
        continue-on-error: true

      - name: Show dependencies
        run: uv pip list

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: '4.4.2'

      - name: Configure R paths (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(R RHOME)/lib" >> "$GITHUB_ENV"

      - name: Configure R paths (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          # Use Rscript.exe to avoid the PowerShell alias 'r' (Invoke-History)
          $R_HOME = (& Rscript.exe -e "cat(normalizePath(R.home(), winslash='\\'))").Trim()
          "R_HOME=$R_HOME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$R_HOME\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$R_HOME\bin\x64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & Rscript.exe -e "sessionInfo()"

      - name: Install R dependencies for ${{ matrix.flag }} (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $pkgs = python -c "from sktime.registry._craft import _r_deps; print(','.join(repr(x) for x in _r_deps('${{ matrix.flag }}')))"
          & Rscript.exe -e "install.packages(c($pkgs), repos='https://cloud.r-project.org', Ncpus=2, dependencies=c('Depends','Imports','LinkingTo'))"

      - name: Install R dependencies for ${{ matrix.flag }} (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          PKGS=$(python -c "from sktime.registry._craft import _r_deps; print(','.join(repr(x) for x in _r_deps('${{ matrix.flag }}')))")
          Rscript -e "install.packages(c($PKGS), repos='https://cloud.r-project.org', Ncpus=2, dependencies=c('Depends','Imports','LinkingTo'))"

      - name: Check R version (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        run: Rscript -e "cat('R=',paste(unlist(getRversion()),collapse='.'),'\n')"

      - name: Install rpy2
        run: uv pip install "rpy2>=3.6,<3.7"
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Run tests with ${{ matrix.flag }}
        env:
          FLAG: ${{ matrix.flag }}
        shell: bash
        run: python -c "from sktime.tests._test_vm import run_test_vm; run_test_vm('${{ matrix.flag }}')"
